name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: "PHP ${{ matrix.php-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.2", "8.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-lock --strict

      - name: PHP syntax check
        run: find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

      - name: XML well-formedness check
        run: |
          python3 - <<'PY'
          import sys
          from pathlib import Path
          import xml.etree.ElementTree as ET
          errors = []
          for f in Path('.').rglob('*.xml'):
              if 'vendor' in f.parts:
                  continue
              try:
                  ET.parse(f)
              except ET.ParseError as e:
                  errors.append(f"{f}: {e}")
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('All XML files are well-formed.')
          PY
